<div class="w-full h-screen flex flex-col bg-white">
    <!-- Header -->
    <div class="bg-gradient-to-r from-emerald-700 to-emerald-800 px-8 py-8 shadow-lg">
        <h1 class="text-4xl font-bold text-white">Transaction Dashboard</h1>
        <p class="mt-2 text-emerald-100 font-medium">Manage and track your financial transactions</p>
    </div>

    <!-- Grid Container -->
    <div class="flex-1 mx-6 my-6 rounded-lg shadow-lg overflow-hidden border border-gray-300">
        <ag-grid-angular
            class="bnp-grid h-full w-full with-custom-text-color"
            [rowData]="rowData"
            [columnDefs]="columnDefs"
            [defaultColDef]="defaultColDef"
            [animateRows]="true"
            [pagination]="true"
            [paginationPageSize]="10"
            [paginationPageSizeSelector]="[10, 20, 50, 100]"
            [rowGroupPanelShow]="'always'"
            [gridOptions]="gridOptions">
        </ag-grid-angular>
    </div>
</div>
